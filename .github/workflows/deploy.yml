name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy worker + apply D1 schema
    runs-on: ubuntu-latest
    environment: CloudFlare
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

      # Schema migrations are run manually with the user's OAuth session
      # (`wrangler d1 execute refi-radar-prod --remote --file=apps/worker/src/db/schema.sql`).
      # The CI API token does not currently have D1:Edit, so doing it here
      # would block every deploy on a 10000 auth error. Schema is additive
      # and applied in advance of the worker code that depends on it.

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy

# Web frontend is deployed by Cloudflare Pages via the GitHub integration
# (auto-builds on every push to main). No wrangler step needed here.
